<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Paga - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --secondary: #fb923c;
            --dark-bg: #f8fafc;
            --panel-bg: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.08) 0%, #f8fafc 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            top: -100px;
            left: -100px;
            z-index: -1;
        }

        .auth-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 3.5rem 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .logo svg {
            width: 36px;
            height: 36px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.9rem 1rem;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .toggle-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">
        <span>&larr;</span> Voltar
    </a>

    <div class="auth-container" id="login-form">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="var(--primary)">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
            </svg>
            Me Paga
        </div>
        
        <h2>Bem-vindo de volta</h2>
        <p>Acesse seu painel para gerenciar suas cobranças.</p>

        <form onsubmit="realizarLogin(event)">
            <div class="form-group">
                <label>E-mail Corporativo</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Entrar na Conta</button>
        </form>

        <div class="toggle-text">
            Não tem uma conta? <a onclick="toggleForm()">Cadastre-se</a>
        </div>
    </div>

    <div class="auth-container" id="register-form" style="display: none;">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="var(--primary)">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
            </svg>
            Me Paga
        </div>
        
        <h2>Criar Nova Conta</h2>
        <p>Comece a proteger suas vendas hoje mesmo.</p>

        <form onsubmit="realizarLogin(event)">
            <div class="form-group">
                <label>Nome da Empresa</label>
                <input type="text" placeholder="Minha Loja" required>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Criar Conta</button>
        </form>

        <div class="toggle-text">
            Já possui conta? <a onclick="toggleForm()">Fazer Login</a>
        </div>
    </div>

    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }

        function realizarLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn');
            btn.innerText = "Aguarde...";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 800);
        }
    </script>
</body>
</html>
