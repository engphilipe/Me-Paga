<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Paga - Login</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --secondary: #fb923c;
            --dark-bg: #f8fafc;
            --panel-bg: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
        }

        body.dark-mode {
            --dark-bg: #0f172a;
            --panel-bg: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.08) 0%, var(--dark-bg) 100%);
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            top: -100px;
            left: -100px;
            z-index: -1;
        }

        .auth-container {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            padding: 3.5rem 3rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            z-index: 10;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .logo svg {
            width: 36px;
            height: 36px;
            fill: var(--primary);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .form-group input {
            width: 100%;
            background: var(--dark-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.9rem 1rem;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            background: var(--panel-bg);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
        }

        .btn {
            width: 100%;
            background: var(--primary);
            color: #ffffff;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
        }

        .toggle-text {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .toggle-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--primary);
        }

        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 9999;
            transition: all 0.3s;
        }
        .brand-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
        .theme-toggle:hover { transform: scale(1.1); }
        .theme-toggle svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 768px) {
            .auth-container { width: 90%; margin: 4rem auto; padding: 2rem; }
            .auth-hero { display: none; }
            body { padding: 1rem; }
            .theme-toggle { bottom: 15px; right: 15px; width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg> Voltar
    </a>

    <div class="auth-container" id="login-form">
        <div class="logo">
            <img src="assets/logo.png" alt="Logo" class="brand-img" />
            Me Paga
        </div>
        
        <h2>Bem-vindo de volta</h2>
        <p>Acesse seu painel para gerenciar suas cobranças.</p>

        <form onsubmit="realizarLogin(event)">
            <div class="form-group">
                <label>E-mail Corporativo</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Entrar na Conta</button>
        </form>

        <div class="toggle-text">
            Não tem uma conta? <a onclick="toggleForm()">Cadastre-se</a>
        </div>
    </div>

    <div class="auth-container" id="register-form" style="display: none;">
        <div class="logo">
            <img src="assets/logo.png" alt="Logo" class="brand-img" />
            Me Paga
        </div>
        
        <h2>Criar Nova Conta</h2>
        <p>Comece a proteger suas vendas hoje mesmo.</p>

        <form onsubmit="realizarLogin(event)">
            <div class="form-group">
                <label>Nome da Empresa</label>
                <input type="text" placeholder="Minha Loja" required>
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Criar Conta</button>
        </form>

        <div class="toggle-text">
            Já possui conta? <a onclick="toggleForm()">Fazer Login</a>
        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" title="Alternar Tema">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }

        function realizarLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('.btn');
            btn.innerText = "Aguarde...";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 800);
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            } else {
                localStorage.setItem('theme', 'light');
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            }
        }
        document.addEventListener('DOMContentLoaded', initTheme);
    </script>
</body>
</html>
