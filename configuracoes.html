<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Paga - Configurações</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --secondary: #fb923c;
            --dark-bg: #f8fafc;
            --panel-bg: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
        }

        body.dark-mode {
            --dark-bg: #0f172a;
            --panel-bg: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 0 2rem 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-img {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            object-fit: cover;
        }

        .nav-item {
            padding: 1rem 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item svg {
            width: 20px; height: 20px;
            stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--primary);
            background: rgba(249, 115, 22, 0.08);
            border-right: 3px solid var(--primary);
        }

        .main-content {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--panel-bg);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .config-section {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .config-section h3 {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            background: rgba(128, 128, 128, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus { border-color: var(--primary); }

        .form-group p.desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-dark); }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-cancel:hover { background: rgba(128, 128, 128, 0.05); }

        .theme-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 9999;
            transition: all 0.3s;
        }
        .theme-toggle:hover { transform: scale(1.1); }
        .theme-toggle svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; padding: 1rem; border-right: none; border-bottom: 1px solid var(--border); justify-content: center; gap: 0.5rem; }
            .brand { padding: 0 1rem 1rem; border-bottom: none; margin-bottom: 0; width: 100%; justify-content: center; }
            .nav-item { padding: 0.5rem 1rem; margin: 0; border-right: none; border-radius: 8px; flex: 1 1 auto; justify-content: center; font-size: 0.85rem; }
            .nav-item.active { border-bottom: 3px solid var(--primary); background: rgba(249, 115, 22, 0.08); border-right: none; }
            .nav-item span { display: none; }
            .main-content { padding: 1.5rem 1rem; }
            header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .user-profile { width: 100%; justify-content: space-between; }
            .config-section { padding: 1.5rem; }
            .theme-toggle { bottom: 15px; right: 15px; width: 45px; height: 45px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <img src="assets/logo.png" alt="Logo" class="brand-img" />
            Me Paga
        </div>
        <a href="dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Visão Geral
        </a>
        <a href="relatorios.html" class="nav-item">
            <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
            Relatórios
        </a>
        <a href="configuracoes.html" class="nav-item active">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Configurações
        </a>
        <div style="flex:1"></div>
        <a href="index.html" class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Sair
        </a>
    </aside>

    <main class="main-content">
        <header>
            <h1>Configurações de Integração</h1>
            <div class="user-profile">
                <div class="avatar">EM</div>
                <span>Empresa Demo</span>
            </div>
        </header>

        <div class="config-section">
            <h3>Chave de API (Chatbot)</h3>
            <div class="form-group">
                <label>Sua Chave Atual</label>
                <input type="text" value="mp_test_8f7d6e5c4b3a21" readonly
                    style="color: var(--success); font-family: monospace; font-weight: 600;">
                <p class="desc">Utilize esta chave no header Authorization das suas requisições.</p>
            </div>
            <button class="btn btn-cancel"
                onclick="alert('Uma nova chave foi gerada. Não se esqueça de atualizar seu bot!')">Gerar Nova
                Chave</button>
        </div>

        <div class="config-section">
            <h3>Webhook Bancário</h3>
            <div class="form-group">
                <label>URL de Callback</label>
                <input type="url" id="webhook-url" placeholder="https://seu-chatbot.com/webhook/mepaga"
                    value="https://meu-sistema.com/api/webhook">
                <p class="desc">Enviaremos um POST para esta URL sempre que um pagamento PIX for liquidado.</p>
            </div>
            <button class="btn" id="btn-salvar" onclick="salvarWebhook()">Salvar Configurações</button>
        </div>
    </main>

    <button class="theme-toggle" onclick="toggleTheme()" title="Alternar Tema">
        <svg id="theme-icon" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
    </button>

    <script>
        function salvarWebhook() {
            const btn = document.getElementById('btn-salvar');
            btn.innerText = "Salvando...";
            setTimeout(() => {
                btn.innerText = "Salvar Configurações";
                alert("Configurações de Webhook salvas com sucesso!");
            }, 800);
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            }
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('theme-icon');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
                icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
            } else {
                localStorage.setItem('theme', 'light');
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
            }
        }
        document.addEventListener('DOMContentLoaded', initTheme);
    </script>
</body>
</html>
