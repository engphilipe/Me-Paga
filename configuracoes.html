<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me Paga - Configurações</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --secondary: #fb923c;
            --dark-bg: #f8fafc;
            --panel-bg: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.02);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            padding: 0 2rem 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand svg {
            width: 24px;
            height: 24px;
            fill: var(--primary);
        }

        .nav-item {
            padding: 1rem 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--primary);
            background: rgba(249, 115, 22, 0.08);
            border-right: 3px solid var(--primary);
        }

        .main-content {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--panel-bg);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .config-section {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .config-section h3 {
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            background: #f1f5f9;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
        }

        .form-group input:focus { border-color: var(--primary); }

        .form-group p.desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-dark); }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-cancel:hover { background: #f1f5f9; }

    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="brand">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
            </svg>
            Me Paga
        </div>
        <a href="dashboard.html" class="nav-item">
            <span>📊</span> Visão Geral
        </a>
        <a href="relatorios.html" class="nav-item">
            <span>📈</span> Relatórios
        </a>
        <a href="configuracoes.html" class="nav-item active">
            <span>⚙️</span> Configurações
        </a>
        <div style="flex:1"></div>
        <a href="index.html" class="nav-item">
            <span>🚪</span> Sair
        </a>
    </aside>

    <main class="main-content">
        <header>
            <h1>Configurações de Integração</h1>
            <div class="user-profile">
                <div class="avatar">EM</div>
                <span>Empresa Demo</span>
            </div>
        </header>

        <div class="config-section">
            <h3>Chave de API (Chatbot)</h3>
            <div class="form-group">
                <label>Sua Chave Atual</label>
                <input type="text" value="mp_test_8f7d6e5c4b3a21" readonly
                    style="color: var(--success); font-family: monospace; font-weight: 600;">
                <p class="desc">Utilize esta chave no header Authorization das suas requisições.</p>
            </div>
            <button class="btn btn-cancel"
                onclick="alert('Uma nova chave foi gerada. Não se esqueça de atualizar seu bot!')">Gerar Nova
                Chave</button>
        </div>

        <div class="config-section">
            <h3>Webhook Bancário</h3>
            <div class="form-group">
                <label>URL de Callback</label>
                <input type="url" id="webhook-url" placeholder="https://seu-chatbot.com/webhook/mepaga"
                    value="https://meu-sistema.com/api/webhook">
                <p class="desc">Enviaremos um POST para esta URL sempre que um pagamento PIX for liquidado.</p>
            </div>
            <button class="btn" id="btn-salvar" onclick="salvarWebhook()">Salvar Configurações</button>
        </div>

    </main>

    <script>
        function salvarWebhook() {
            const btn = document.getElementById('btn-salvar');
            btn.innerText = "Salvando...";
            setTimeout(() => {
                btn.innerText = "Salvar Configurações";
                alert("Configurações de Webhook salvas com sucesso!");
            }, 800);
        }
    </script>
</body>

</html>
